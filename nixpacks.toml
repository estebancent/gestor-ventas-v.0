[variables]
    NIXPACKS_PHP_V = '8.3'
    APP_ENV = 'production'

[phases.setup]
    nixPkgs = ['...', 'php83', 'php83Packages.composer', 'nodejs_20']

[phases.build]
    dependsOn = ['setup']
    cmds = [
        # 1. Creamos las carpetas de storage ANTES de tocar PHP
        'mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache',
        'chmod -R 775 storage bootstrap/cache',
        
        # 2. Instalamos SIN ejecutar scripts (esto evita el error del cache path)
        'composer install --no-dev --no-scripts --optimize-autoloader',
        
        # 3. Ahora que vendor existe y hay carpetas, registramos paquetes
        'php artisan package:discover --ansi',
        
        # 4. Construimos el frontend
        'npm install && npm run build'
    ]

[phases.start]
    cmds = [
        'php artisan migrate --force',
        'php artisan serve --host 0.0.0.0 --port $PORT'
    ]