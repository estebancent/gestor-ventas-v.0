[variables]
    NIXPACKS_PHP_V = '8.3'
    COMPOSER_INSTALL_FLAGS = '--no-dev --optimize-autoloader --no-interaction --no-scripts'

[phases.setup]
    nixPkgs = ['...', 'php83', 'php83Packages.composer', 'nodejs_20']

[phases.build]
    dependsOn = ['setup']
    cmds = ['composer install $COMPOSER_INSTALL_FLAGS', 'npm install && npm run build']