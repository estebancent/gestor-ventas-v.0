[variables]
    NIXPACKS_PHP_V = '8.3'
    # Evitamos que Laravel intente usar carpetas que no existen durante el build
    APP_SERVICES_CACHE = '/tmp/services.php'
    APP_PACKAGES_CACHE = '/tmp/packages.php'

[phases.setup]
    nixPkgs = ['...', 'php83', 'php83Packages.composer', 'nodejs_20']

[phases.build]
    dependsOn = ['setup']
    cmds = [
        # 1. Crear carpetas de storage ANTES de cualquier comando de PHP
        'mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache',
        'chmod -R 777 storage bootstrap/cache',
        # 2. Instalar dependencias SIN ejecutar scripts automáticos (esto evita el error del cache path)
        'composer install --no-dev --no-scripts --optimize-autoloader',
        # 3. Ahora que vendor existe, registramos los paquetes manualmente
        'php artisan package:discover --ansi',
        # 4. Compilar assets
        'npm install && npm run build'
    ]

[phases.start]
    cmds = [
        'php artisan migrate --force',
        'php artisan serve --host 0.0.0.0 --port $PORT'
    ]