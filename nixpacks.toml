[variables]
    NIXPACKS_PHP_V = '8.3'

[phases.build]
    dependsOn = ['setup']
    cmds = [
        'composer install --no-dev --optimize-autoloader --no-interaction',
        'npm install',
        'npm run build'
    ]

[phases.start]
    # Ejecutamos las migraciones y el servidor sin forzar caches de build
    cmds = [
        'php artisan migrate --force',
        'php artisan serve --host 0.0.0.0 --port $PORT'
    ]